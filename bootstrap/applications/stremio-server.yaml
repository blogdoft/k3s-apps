apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stremio-server
  namespace: argocd
spec:
  project: home-lab
  source:
    repoURL: git@github.com:blogdoft/k3s-apps.git
    path: artifacts/home-lab/stremio-server/manifests
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: stremio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
      - CreateNamespace=true