apiVersion: apps/v1
kind: Deployment
metadata:
  name: stremio-web
  namespace: stremio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stremio-web
  template:
    metadata:
      labels:
        app: stremio-web
    spec:
      containers:
        - name: stremio-web
          image: forgejo.home.arpa/sauron/stremio-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: stremio-web
  namespace: stremio
spec:
  selector:
    app: stremio-web
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stremio-web
  namespace: stremio
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca-cluster-issuer
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - stremio-web.home.arpa
      secretName: stremio-web-home-arpa-tls
  rules:
    - host: stremio-web.home.arpa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stremio-web
                port:
                  number: 80